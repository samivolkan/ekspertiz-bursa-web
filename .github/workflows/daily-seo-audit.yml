name: Daily SEO Audit and Safe Fixes

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: daily-seo-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Restore score history
        uses: actions/cache@v4
        with:
          path: .seo-audit-history
          key: seo-audit-history-${{ github.run_id }}
          restore-keys: |
            seo-audit-history-
      - name: Install locked dependencies
        run: npm ci
      - name: Validate source
        run: |
          npm run lint
          npm run typecheck
      - name: Build production static site
        run: npm run build:static-hosting
      - name: Audit generated site
        run: npm run seo:audit:local
      - name: Audit production with retries
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: npm run seo:audit:production
      - name: Publish job summary
        if: always()
        run: cat outputs/seo-audit/production/latest/summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Update single tracking issue and optional notifications
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/seo-audit/update-github-issue.mjs outputs/seo-audit/production/latest/report.json
      - name: Upload JSON HTML and Markdown reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-${{ github.run_id }}
          path: outputs/seo-audit
          retention-days: 30
      - name: Enforce critical quality gate
        if: always()
        run: node scripts/seo-audit/gate.mjs outputs/seo-audit/production/latest/report.json

  safe-auto-fix:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Create isolated automation branch
        id: branch
        shell: bash
        run: |
          branch="automation/seo-fixes-$(date -u +%F)"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git switch -c "$branch"
          echo "name=$branch" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Create before score
        if: steps.branch.outputs.skip == 'false'
        run: |
          npm run build:static-hosting
          npm run seo:audit:local
          cp outputs/seo-audit/local/latest/report.json outputs/seo-audit/before-fix.json
      - name: Apply deterministic fixes (maximum three rounds)
        if: steps.branch.outputs.skip == 'false'
        shell: bash
        run: |
          for round in 1 2 3; do
            npm run seo:audit:fix
            git diff --quiet && break
          done
      - name: Detect source changes
        if: steps.branch.outputs.skip == 'false'
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then echo "found=false" >> "$GITHUB_OUTPUT"; else echo "found=true" >> "$GITHUB_OUTPUT"; fi
      - name: Validate fixes and verify score improvement
        if: steps.changes.outputs.found == 'true'
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build:static-hosting
          npm run seo:audit:local
          node scripts/seo-audit/compare-scores.mjs outputs/seo-audit/before-fix.json outputs/seo-audit/local/latest/report.json
      - name: Revert non-improving changes
        if: failure() && steps.changes.outputs.found == 'true'
        run: git restore --staged --worktree .
      - name: Commit and push safe fixes
        if: success() && steps.changes.outputs.found == 'true'
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "seo-audit-bot"
          git config user.email "seo-audit-bot@users.noreply.github.com"
          git add app components lib
          git commit -m "Apply safe daily SEO fixes"
          git push origin "$BRANCH_NAME"
      - name: Open one draft pull request
        if: success() && steps.changes.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        shell: bash
        run: |
          existing=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then exit 0; fi
          before=$(node -p "require('./outputs/seo-audit/before-fix.json').totalScore")
          after=$(node -p "require('./outputs/seo-audit/local/latest/report.json').totalScore")
          gh pr create --draft --head "$BRANCH_NAME" --base main --title "Güvenli günlük SEO düzeltmeleri $(date -u +%F)" --body "## Puan\n- Önce: $before/100\n- Sonra: $after/100\n\n## Güvence\n- Yalnız deterministik düzeltmeler uygulandı.\n- Lint, type-check, test, production build ve yeniden audit geçti.\n- Otomatik merge kapalıdır.\n\n## Manuel kontrol\nDeğişen bağlantı ve metadata alanlarını önizlemede kontrol edin. Geri alma için bu PR'ı kapatın."
